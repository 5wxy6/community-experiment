<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>社区互动实验</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">
    <style>
      body { margin: 0; padding: 0; background: #000; overflow: hidden; }
      #root { width: 100vw; height: 100vh; }
      #loading { 
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        color: white; font-family: Arial; text-align: center;
      }
      #loading .progress { color: #0f0; margin-top: 10px; }
      #errors { position: fixed; top: 10px; left: 10px; color: #f66; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-width: 90vw; }
    </style>
  </head>
  <body>
    <div id="loading">
      <div>正在加载实验资源...</div>
      <div class="progress" id="progress">0%</div>
      <div style="font-size: 14px; margin-top: 20px; color: #aaa;">首次加载可能需要 10-30 秒</div>
    </div>
    <div id="errors"></div>
    <div id="root"></div>

    <!-- Participant Info Form -->
    <div id="participant-form" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#333; padding:30px; border-radius:10px; color:white; font-family:Arial; z-index:1000;">
      <h3 style="margin-top:0;">参与者信息</h3>
      <div style="margin:15px 0;">
        <label>Participant ID: </label>
        <input type="text" id="input-participant" value="001" style="padding:5px; width:150px;">
      </div>
      <div style="margin:15px 0;">
        <label>Session: </label>
        <input type="text" id="input-session" value="001" style="padding:5px; width:150px;">
      </div>
      <div style="margin:15px 0;">
        <label>Group: </label>
        <input type="text" id="input-group" value="1" style="padding:5px; width:150px;">
      </div>
      <button id="start-btn" style="padding:10px 30px; margin-top:15px; font-size:16px; cursor:pointer;">开始实验</button>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/PreloadJS/1.0.1/preloadjs.min.js"></script>

    <script type="module">
      (function() {
        var errors = document.getElementById('errors');
        var loading = document.getElementById('loading');
        var progress = document.getElementById('progress');

        function log(msg) {
          errors.textContent += msg + '\n';
          console.log(msg);
        }

        window.onerror = function(msg, url, line, col, error) {
          var details = 'ERROR: ' + msg + ' at line ' + line;
          if (col) details += ':' + col;
          if (url) details += ' in ' + url;
          if (error && error.stack) details += '\nStack: ' + error.stack;
          log(details);
          console.error('Global error:', error);
          loading.innerHTML = '<div style="color:#f66">加载出错，请刷新重试<br>' + details.replace(/\n/g, '<br>') + '</div>';
        };

        window.onunhandledrejection = function(event) {
          var reason = event.reason;
          var msg = 'Unhandled Promise Rejection: ' + (reason && reason.message ? reason.message : reason);
          if (reason && reason.stack) msg += '\n' + reason.stack;
          log(msg);
          console.error('Unhandled rejection:', reason);
        };

        var percent = 0;
        var interval = setInterval(function() {
          percent += 5;
          if (percent > 90) percent = 90;
          progress.textContent = percent + '%';
        }, 500);

        import('./experiment.js').then(function(module) {
          clearInterval(interval);
          progress.textContent = '100%';
          setTimeout(function() {
            loading.style.display = 'none';
            // Show participant form
            document.getElementById('participant-form').style.display = 'block';
          }, 500);
        }).catch(function(err) {
          clearInterval(interval);
          console.error('Import error:', err);
          var errorMsg = err.message || err.toString();
          if (err.stack) errorMsg += '\n' + err.stack;
          log('加载失败: ' + errorMsg);
          loading.innerHTML = '<div style="color:#f66">加载失败，请刷新重试<br>错误: ' + errorMsg.replace(/\n/g, '<br>') + '</div>';
        });
      })();

      // Handle participant form submission
      document.getElementById('start-btn').addEventListener('click', async function() {
        var participant = document.getElementById('input-participant').value || '001';
        var session = document.getElementById('input-session').value || '001';
        var group = document.getElementById('input-group').value || '1';

        // Set values in global expInfo (will be used by experiment.js)
        window.expInfoOverride = {
          participant: participant,
          session: session,
          group: group
        };

        // Hide form and show loading
        document.getElementById('participant-form').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('progress').textContent = '正在启动实验...';

        // Trigger experiment start
        if (window.startExperiment) {
          try {
            await window.startExperiment(window.expInfoOverride);
          } catch (err) {
            console.error('启动失败:', err);
            document.getElementById('errors').textContent = '启动失败: ' + err.message;
          }
        }
      });
    </script>
  </body>
</html>
